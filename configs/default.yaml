schema_version: 1
experiment:
  name: default_seeding_test
  mode: control_vs_seeding
  description: Basic warm-cloud hygroscopic seeding configuration.
  random_seed: 42
simulation:
  adapter: placeholder_warm_cloud
  case_name: base
  notes: Use placeholder_warm_cloud for UI testing or pysdm_parcel for real PySDM
    simulation.
environment:
  temperature: 300.0
  pressure: 100000.0
  water_vapour_mixing_ratio: 0.0222
  relative_humidity: 95.0
  initial_altitude: 0.0
  updraft_velocity: 1.0
  duration: 1500
  timestep: 15
background_aerosol:
  distribution_type: single_lognormal
  number_concentration: 100.0
  number_superdroplets: 100
  dry_radius: 7.5e-08
  geometric_sigma: 1.4
  kappa: 0.5
  particle_density: 1770.0
  chemical_composition: ammonium_sulfate_like
seeding:
  enabled: true
  material_type: hygroscopic
  dry_radius: 1.0e-06
  geometric_sigma: 1.2
  kappa: 0.8
  particle_density: 1770.0
  number_superdroplets: 100
  injection_start: 900
  injection_end: 1200
  injection_altitude: 500.0
  delivery_method: idealized_uniform
  number_concentration: 10.0
dynamics:
  updraft_strength: 1.0
  downdraft_strength: 0.0
  turbulence_intensity: 0.0
  entrainment_rate: 0.0
  detrainment_rate: 0.0
  wind_shear: 0.0
  convergence: 0.0
  cape: 0.0
  cin: 0.0
microphysics:
  condensation: true
  collision: false
  sedimentation: false
diagnostics:
  growth_pathway_mode: true
  activation_radius_threshold: 5.0e-07
  rain_radius_threshold: 2.5e-05
  wet_radius_spectrum:
    enabled: true
    min_radius: 5.0e-08
    max_radius: 0.001
    n_bins: 32
    checkpoint_times: []
    threshold_factors:
    - 0.8
    - 1.0
    - 1.2
  water_budget:
    enabled: true
    warning_relative_drift_percent: 0.01
    failure_relative_drift_percent: 0.1
  numerical_convergence:
    enabled: true
    relative_tolerance_percent: 5.0
    metrics: []
  spectrum_transition:
    enabled: true
    rain_volume_fraction_threshold: 0.01
output:
  base_dir: results
  save_config: true
  save_summary: true
  save_timeseries: true
