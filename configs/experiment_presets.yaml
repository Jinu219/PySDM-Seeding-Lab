presets:
  experiment_1_numerical_representation:
    description: Super-droplet number and timestep sensitivity.
    sweep_parameters:
      initial_superdroplets: [50, 100, 200, 500]
      timestep: [5, 10, 15, 30]

  experiment_2_seeding_parameter_sensitivity:
    description: Seeding dry radius, kappa, and injection timing sensitivity.
    sweep_parameters:
      seeding.dry_radius: [5.0e-7, 1.0e-6, 1.5e-6, 2.0e-6, 3.0e-6]
      seeding.kappa: [0.8, 1.0, 1.2]
      seeding.injection_start: [600, 900, 1200]

  experiment_3_realistic_warm_hygroscopic_seeding:
    description: Realistic warm hygroscopic seeding scenario.
    sweep_parameters:
      background_aerosol.number_concentration: [100, 300, 1000]
      seeding.dry_radius: [1.0e-6, 2.0e-6]
      seeding.kappa: [0.8, 1.0, 1.2]

  experiment_4_efficiency_optimization:
    description: Objective-function based seeding efficiency optimization.
    objective:
      maximize: accumulated_precipitation
      minimize: cloud_water_loss
      constraints:
        max_seeding_number_superdroplets: 500
