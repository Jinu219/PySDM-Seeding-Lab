schema_version: 1
experiment:
  name: urban_polluted_cloud
  mode: control_vs_seeding
  description: Polluted urban-like warm cloud background.
  random_seed: 42
simulation:
  adapter: placeholder_warm_cloud
  case_name: base
  notes: Use placeholder_warm_cloud for UI testing or pysdm_parcel for real PySDM
    simulation.
environment:
  temperature: 302.0
  pressure: 100000.0
  water_vapour_mixing_ratio: 0.021
  relative_humidity: 90.0
  initial_altitude: 0.0
  updraft_velocity: 1.2
  duration: 1500
  timestep: 15
background_aerosol:
  distribution_type: single_lognormal
  number_concentration: 1000.0
  number_superdroplets: 100
  dry_radius: 5.0e-08
  geometric_sigma: 1.7
  kappa: 0.3
  particle_density: 1500.0
  chemical_composition: urban_pollution_mixed
seeding:
  enabled: true
  material_type: hygroscopic
  dry_radius: 1.0e-06
  geometric_sigma: 1.2
  kappa: 0.8
  particle_density: 1770.0
  number_superdroplets: 100
  injection_start: 900
  injection_end: 1200
  injection_altitude: 500.0
  delivery_method: idealized_uniform
  number_concentration: 10.0
dynamics:
  updraft_strength: 1.2
  downdraft_strength: 0.0
  turbulence_intensity: 0.2
  entrainment_rate: 0.0
  detrainment_rate: 0.0
  wind_shear: 0.0
  convergence: 0.0
  cape: 0.0
  cin: 0.0
microphysics:
  condensation: true
  collision: false
  sedimentation: false
diagnostics:
  growth_pathway_mode: true
  activation_radius_threshold: 5.0e-07
  rain_radius_threshold: 2.5e-05
output:
  base_dir: results
  save_config: true
  save_summary: true
  save_timeseries: true
