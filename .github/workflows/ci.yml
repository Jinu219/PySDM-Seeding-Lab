name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  fast-regression:
    name: Fast regression (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install validated dependencies
        run: >-
          python -m pip install
          --requirement requirements-ci.txt
          --requirement requirements-observations.txt

      - name: Run fast unit and workflow regressions
        run: >-
          python -m unittest -v
          tests.test_columnar_cache
          tests.test_native_diagnostics.NativeDiagnosticMappingTests
          tests.test_server_execution
          tests.test_transition_observation_validation
          tests.test_bastalias_observations
          tests.test_arm_ena_observations
          tests.test_scientific_scope
          tests.test_release_readiness
          tests.test_release_candidate

      - name: Check project integrity
        run: python scripts/check_project_integrity.py

      - name: Validate v1 release gate structure
        run: python scripts/check_release_readiness.py --allow-incomplete

      - name: Validate v1 scientific claim scope
        run: python scripts/check_scientific_scope.py

      - name: Validate v1 release candidate
        run: python scripts/check_v1_release_candidate.py

  real-pysdm-integration:
    name: Real PySDM integration (Ubuntu)
    if: github.event_name != 'pull_request'
    needs: fast-regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install validated dependencies
        run: python -m pip install --requirement requirements-ci.txt

      - name: Run real PySDM integration tests
        run: >-
          python -m unittest -v
          tests.test_native_diagnostics.NativePySDMIntegrationTests
